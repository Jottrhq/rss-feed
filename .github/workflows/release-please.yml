name: Release Please

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest
        run: python scripts/validate-plugin-json.py plugin.json

  release-please:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Normalize plugin version from release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          tag = os.environ['RELEASE_TAG']
          match = re.search(r'(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:[-+][0-9A-Za-z.-]+)?', tag)
          if not match:
              raise SystemExit(f'Could not determine plugin version from release tag: {tag}')
          version = match.group(0)
          path = Path('plugin.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['version'] = version
          path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')
          print(f"Normalized plugin.json version to {version}")
          PY
      - name: Read plugin metadata
        id: metadata
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          data = json.load(open('plugin.json', encoding='utf-8'))
          print(f"name={data['name']}")
          print(f"version={data['version']}")
          PY
      - name: Package plugin and checksum
        run: python scripts/package-plugin.py --name "${{ steps.metadata.outputs.name }}" --version "${{ steps.metadata.outputs.version }}"
      - name: Verify checksum asset
        shell: bash
        run: |
          cd dist
          sha256sum --check "${{ steps.metadata.outputs.name }}-${{ steps.metadata.outputs.version }}.zip.sha256"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber
